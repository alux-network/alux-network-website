<svg viewBox="0 0 1672 941" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A room reservation and a payment authorization arrive from different systems. Only when both are ready does one atomic booking confirmation leave the boundary.">
  <defs>
    <linearGradient id="mx-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="0.58" stop-color="#f5f2eb"/>
      <stop offset="1" stop-color="#ece8df"/>
    </linearGradient>
    <linearGradient id="mx-metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#eee9df"/>
      <stop offset="1" stop-color="#c5bcaa"/>
    </linearGradient>
    <linearGradient id="mx-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b5448"/>
      <stop offset="0.5" stop-color="#3c372f"/>
      <stop offset="1" stop-color="#29251f"/>
    </linearGradient>
    <linearGradient id="mx-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.94"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#d5ccbc" stop-opacity="0.36"/>
    </linearGradient>
    <radialGradient id="mx-atomic-glow">
      <stop offset="0" stop-color="#62bb8a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#62bb8a" stop-opacity="0"/>
    </radialGradient>
    <filter id="mx-shadow" x="-50%" y="-60%" width="200%" height="240%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#302a22" flood-opacity="0.2"/>
    </filter>
    <filter id="mx-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <clipPath id="mx-output-mask">
      <rect x="990" y="350" width="682" height="240"/>
    </clipPath>

    <g id="mx-module">
      <rect x="-146" y="-108" width="292" height="216" rx="26" fill="#d9d0bf" opacity="0.72"/>
      <rect x="-138" y="-100" width="276" height="200" rx="22" fill="url(#mx-metal)" stroke="#ffffff" stroke-width="3"/>
      <rect x="-116" y="-78" width="232" height="156" rx="15" fill="url(#mx-glass)" stroke="currentColor" stroke-opacity="0.55" stroke-width="5"/>
      <circle cx="104" cy="-67" r="7" fill="currentColor"/>
    </g>

    <g id="mx-hotel">
      <rect x="-45" y="-34" width="90" height="74" rx="9" fill="#eef7f5" stroke="#397f79" stroke-width="4"/>
      <path d="M -55 -34 L 0 -67 L 55 -34" fill="#c8e8e3" stroke="#397f79" stroke-width="4" stroke-linejoin="round"/>
      <rect x="-12" y="8" width="24" height="32" rx="5" fill="#4a938b"/>
      <g fill="#8fcfc7">
        <rect x="-32" y="-20" width="17" height="17" rx="3"/>
        <rect x="15" y="-20" width="17" height="17" rx="3"/>
        <rect x="-32" y="8" width="17" height="17" rx="3"/>
        <rect x="15" y="8" width="17" height="17" rx="3"/>
      </g>
    </g>

    <g id="mx-coins">
      <ellipse cx="0" cy="22" rx="48" ry="15" fill="#ac8147"/>
      <ellipse cx="0" cy="10" rx="48" ry="15" fill="#d8a755"/>
      <ellipse cx="0" cy="-3" rx="48" ry="15" fill="#b98945"/>
      <ellipse cx="0" cy="-16" rx="48" ry="15" fill="#edc26e"/>
      <ellipse cx="0" cy="-24" rx="48" ry="15" fill="#ffe4a4" stroke="#b98945" stroke-width="3"/>
      <circle cy="-24" r="9" fill="#d29c45" opacity="0.56"/>
    </g>

    <g id="mx-booking-token">
      <rect x="-48" y="-38" width="96" height="76" rx="16" fill="url(#mx-glass)" stroke="#4b9f98" stroke-width="4"/>
      <g transform="scale(.52)"><use href="#mx-hotel"/></g>
    </g>
    <g id="mx-payment-token">
      <rect x="-48" y="-38" width="96" height="76" rx="16" fill="url(#mx-glass)" stroke="#b27c43" stroke-width="4"/>
      <g transform="translate(0,4) scale(.5)"><use href="#mx-coins"/></g>
    </g>

    <g id="mx-lock-body">
      <rect x="-46" y="-8" width="92" height="78" rx="20" fill="#37322b" stroke="#978a76" stroke-width="5"/>
      <circle cy="23" r="12" fill="#d9aa58"/>
      <rect x="-5" y="23" width="10" height="22" rx="5" fill="#d9aa58"/>
    </g>

    <g id="mx-confirmation">
      <rect x="-125" y="-54" width="250" height="108" rx="24" fill="url(#mx-glass)" stroke="#62aa83" stroke-width="5"/>
      <g transform="translate(-62,0) scale(.42)"><use href="#mx-hotel"/></g>
      <line x1="0" y1="-32" x2="0" y2="32" stroke="#c7beae" stroke-width="3"/>
      <g transform="translate(58,4) scale(.4)"><use href="#mx-coins"/></g>
      <circle cx="104" cy="-34" r="11" fill="#62bb8a"/>
    </g>
  </defs>

  <style>
    .mx-booking-token { offset-path: path("M 365 270 C 570 270 648 346 790 421"); offset-rotate: 0deg; animation: mx-booking 9.2s ease-in-out infinite; }
    .mx-payment-token { offset-path: path("M 365 670 C 570 670 648 594 790 519"); offset-rotate: 0deg; animation: mx-payment 9.2s ease-in-out infinite; }
    .mx-ready-a { animation: mx-ready-a 9.2s ease-in-out infinite; }
    .mx-ready-b { animation: mx-ready-b 9.2s ease-in-out infinite; }
    .mx-lock { animation: mx-lock 9.2s ease-in-out infinite; transform-origin: 0 0; }
    .mx-shackle { animation: mx-shackle 9.2s cubic-bezier(.22,.72,.24,1) infinite; transform-origin: 0 -6px; }
    .mx-glow { animation: mx-glow 9.2s ease-out infinite; transform-origin: 850px 470px; }
    .mx-confirmation { animation: mx-confirmation 9.2s cubic-bezier(.36,0,.18,1) infinite; }
    .mx-dock-light { animation: mx-dock-light 9.2s ease-in-out infinite; }

    @keyframes mx-booking {
      0%, 5% { offset-distance: 0%; opacity: 0; transform: scale(.82); }
      9% { opacity: 1; transform: scale(1); }
      34%, 47% { offset-distance: 100%; opacity: 1; transform: scale(1); }
      51%, 100% { offset-distance: 100%; opacity: 0; transform: scale(.78); }
    }
    @keyframes mx-payment {
      0%, 18% { offset-distance: 0%; opacity: 0; transform: scale(.82); }
      22% { opacity: 1; transform: scale(1); }
      47%, 51% { offset-distance: 100%; opacity: 1; transform: scale(1); }
      55%, 100% { offset-distance: 100%; opacity: 0; transform: scale(.78); }
    }
    @keyframes mx-ready-a { 0%, 32% { fill: #9b9285; opacity: .38; } 37%, 94% { fill: #4b9f98; opacity: 1; } 99%,100% { opacity: .38; } }
    @keyframes mx-ready-b { 0%, 45% { fill: #9b9285; opacity: .38; } 50%, 94% { fill: #b27c43; opacity: 1; } 99%,100% { opacity: .38; } }
    @keyframes mx-lock {
      0%, 47% { transform: scale(1); opacity: .86; }
      53% { transform: scale(.94); opacity: 1; }
      59%, 87% { transform: scale(1.03); opacity: 1; }
      96%,100% { transform: scale(1); opacity: .86; }
    }
    @keyframes mx-shackle {
      0%, 49% { transform: translateY(0) rotate(0deg); }
      56%, 88% { transform: translateY(-14px) rotate(9deg); }
      96%, 100% { transform: translateY(0) rotate(0deg); }
    }
    @keyframes mx-glow {
      0%, 49%, 68%, 100% { opacity: 0; transform: scale(.58); }
      56% { opacity: 1; transform: scale(1); }
      65% { opacity: .2; transform: scale(1.55); }
    }
    @keyframes mx-confirmation {
      0%, 56% { transform: translate(970px,470px) scale(.84); opacity: 0; }
      62% { transform: translate(1015px,470px) scale(1); opacity: 1; }
      69% { transform: translate(1120px,470px) scale(1); opacity: 1; }
      86%, 94% { transform: translate(1400px,470px) scale(1); opacity: 1; }
      99%,100% { transform: translate(1400px,470px) scale(1); opacity: 0; }
    }
    @keyframes mx-dock-light { 0%, 79% { fill: #81796c; } 86%, 94% { fill: #62bb8a; } 99%,100% { fill: #81796c; } }

    @media (prefers-reduced-motion: reduce) {
      .mx-booking-token, .mx-payment-token, .mx-ready-a, .mx-ready-b, .mx-lock, .mx-shackle, .mx-glow, .mx-confirmation, .mx-dock-light { animation: none !important; }
      .mx-booking-token, .mx-payment-token { opacity: 0; }
      .mx-ready-a { fill: #4b9f98; opacity: 1; }
      .mx-ready-b { fill: #b27c43; opacity: 1; }
      .mx-lock { opacity: 1; }
      .mx-shackle { transform: translateY(-14px) rotate(9deg); }
      .mx-glow { opacity: .18; transform: scale(1); }
      .mx-confirmation { transform: translate(1320px,470px); opacity: 1; }
      .mx-dock-light { fill: #62bb8a; }
    }
  </style>

  <rect width="1672" height="941" fill="url(#mx-bg)"/>
  <ellipse cx="850" cy="470" rx="410" ry="300" fill="#ffffff" opacity="0.22" filter="url(#mx-soft)"/>

  <ellipse cx="220" cy="374" rx="168" ry="30" fill="#302a22" opacity=".13" filter="url(#mx-soft)"/>
  <ellipse cx="220" cy="774" rx="168" ry="30" fill="#302a22" opacity=".13" filter="url(#mx-soft)"/>
  <ellipse cx="850" cy="625" rx="190" ry="38" fill="#302a22" opacity=".12" filter="url(#mx-soft)"/>

  <g transform="translate(220,270)" color="#4b9f98" filter="url(#mx-shadow)">
    <use href="#mx-module"/>
    <g transform="scale(.88)"><use href="#mx-hotel"/></g>
  </g>
  <g transform="translate(220,670)" color="#b27c43" filter="url(#mx-shadow)">
    <use href="#mx-module"/>
    <g transform="translate(0,8) scale(.9)"><use href="#mx-coins"/></g>
  </g>

  <path d="M 365 270 C 570 270 648 346 790 421" fill="none" stroke="#d9d0bf" stroke-width="60" stroke-linecap="round"/>
  <path d="M 365 270 C 570 270 648 346 790 421" fill="none" stroke="url(#mx-dark)" stroke-width="44" stroke-linecap="round"/>
  <path d="M 365 270 C 570 270 648 346 790 421" fill="none" stroke="#4b9f98" stroke-width="7" stroke-linecap="round"/>

  <path d="M 365 670 C 570 670 648 594 790 519" fill="none" stroke="#d9d0bf" stroke-width="60" stroke-linecap="round"/>
  <path d="M 365 670 C 570 670 648 594 790 519" fill="none" stroke="url(#mx-dark)" stroke-width="44" stroke-linecap="round"/>
  <path d="M 365 670 C 570 670 648 594 790 519" fill="none" stroke="#b27c43" stroke-width="7" stroke-linecap="round"/>

  <g class="mx-booking-token" filter="url(#mx-shadow)"><use href="#mx-booking-token"/></g>
  <g class="mx-payment-token" filter="url(#mx-shadow)"><use href="#mx-payment-token"/></g>

  <circle class="mx-glow" cx="850" cy="470" r="190" fill="url(#mx-atomic-glow)"/>
  <g transform="translate(850,470)" filter="url(#mx-shadow)">
    <circle r="145" fill="#d9d0bf"/>
    <circle r="132" fill="url(#mx-metal)" stroke="#a89b87" stroke-width="5"/>
    <circle r="105" fill="url(#mx-glass)" stroke="#ffffff" stroke-width="6"/>
    <circle class="mx-ready-a" cx="-72" cy="-72" r="13" fill="#9b9285"/>
    <circle class="mx-ready-b" cx="72" cy="72" r="13" fill="#9b9285"/>
  </g>
  <g transform="translate(850,470)">
    <path class="mx-shackle" d="M -29 -6 V -30 C -29 -66 29 -66 29 -30 V -6" fill="none" stroke="#766a59" stroke-width="12" stroke-linecap="round"/>
    <g class="mx-lock"><use href="#mx-lock-body"/></g>
  </g>

  <path d="M 995 470 H 1590" fill="none" stroke="#d9d0bf" stroke-width="62" stroke-linecap="round"/>
  <path d="M 995 470 H 1590" fill="none" stroke="url(#mx-dark)" stroke-width="46" stroke-linecap="round"/>
  <path d="M 995 470 H 1590" fill="none" stroke="#d5a24e" stroke-width="7" stroke-linecap="round"/>

  <g clip-path="url(#mx-output-mask)"><g class="mx-confirmation" filter="url(#mx-shadow)"><use href="#mx-confirmation"/></g></g>
  <g transform="translate(1530,470)" filter="url(#mx-shadow)">
    <rect x="-8" y="-68" width="16" height="136" rx="8" fill="#c9c0b0" stroke="#8c806e" stroke-width="2"/>
    <rect x="-38" y="-84" width="76" height="28" rx="12" fill="#3a352e" stroke="#b78443" stroke-width="4"/>
    <circle class="mx-dock-light" cy="-70" r="9" fill="#81796c"/>
  </g>
</svg>
