<svg viewBox="0 0 1672 941" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="One transaction leaves a waiting condition in a channel. Another transaction sends a matching message, triggering COMM and a new continuation.">
  <defs>
    <linearGradient id="cx-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="0.58" stop-color="#f5f2eb"/>
      <stop offset="1" stop-color="#ece8df"/>
    </linearGradient>
    <linearGradient id="cx-rail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#595247"/>
      <stop offset="0.48" stop-color="#3d372e"/>
      <stop offset="1" stop-color="#2c2822"/>
    </linearGradient>
    <linearGradient id="cx-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="0.52" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#d4ccbc" stop-opacity="0.42"/>
    </linearGradient>
    <radialGradient id="cx-halo">
      <stop offset="0" stop-color="#51aa9f" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#51aa9f" stop-opacity="0"/>
    </radialGradient>
    <filter id="cx-shadow" x="-50%" y="-60%" width="200%" height="240%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#302a22" flood-opacity="0.18"/>
    </filter>
    <filter id="cx-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>

    <g id="cx-rail-shape">
      <rect x="-140" y="-29" width="1950" height="72" rx="17" fill="#d9d0bf"/>
      <rect x="-140" y="-20" width="1950" height="54" rx="13" fill="url(#cx-rail)"/>
      <rect x="-140" y="-20" width="1950" height="9" rx="4.5" fill="#81796c" opacity="0.72"/>
      <line x1="-100" y1="7" x2="1770" y2="7" stroke="currentColor" stroke-width="7" stroke-linecap="round" opacity="0.82"/>
    </g>

    <g id="cx-capsule">
      <ellipse cx="0" cy="42" rx="102" ry="16" fill="#211e19" opacity="0.22"/>
      <rect x="-110" y="18" width="220" height="27" rx="13.5" fill="#302b24"/>
      <rect x="-110" y="15" width="220" height="8" rx="4" fill="#70685c"/>
      <rect x="-102" y="-48" width="204" height="70" rx="35" fill="url(#cx-glass)" stroke="#ffffff" stroke-opacity="0.9" stroke-width="3"/>
      <path d="M -78 -35 Q -38 -44 10 -39" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.34"/>
      <circle cx="72" cy="-5" r="6" fill="currentColor" opacity="0.72"/>
    </g>

    <g id="cx-hotel">
      <rect x="-34" y="-29" width="68" height="57" rx="7" fill="#eef8f6" stroke="#367f78" stroke-width="3"/>
      <path d="M -41 -29 L 0 -53 L 41 -29" fill="#c8e8e3" stroke="#367f78" stroke-width="3" stroke-linejoin="round"/>
      <rect x="-9" y="4" width="18" height="24" rx="4" fill="#4a938b"/>
      <g fill="#8fcfc7"><rect x="-24" y="-17" width="12" height="12" rx="2"/><rect x="12" y="-17" width="12" height="12" rx="2"/><rect x="-24" y="3" width="12" height="12" rx="2"/><rect x="12" y="3" width="12" height="12" rx="2"/></g>
    </g>

    <g id="cx-room-key">
      <rect x="-43" y="-31" width="86" height="62" rx="13" fill="#eef8f6" stroke="#3f958c" stroke-width="4"/>
      <circle cx="-14" cy="0" r="11" fill="none" stroke="#3f756f" stroke-width="5"/>
      <path d="M -3 0 H 25 M 16 0 V 9 M 25 0 V 7" fill="none" stroke="#3f756f" stroke-width="5" stroke-linecap="round"/>
      <circle cx="31" cy="-20" r="5" fill="#70c8bd"/>
    </g>

    <g id="cx-robot">
      <line x1="0" y1="-31" x2="0" y2="-43" stroke="#756b5d" stroke-width="3"/>
      <circle cx="0" cy="-47" r="5" fill="#8873c8"/>
      <circle cx="-29" cy="-4" r="6" fill="#c7bdac" stroke="#756b5d" stroke-width="2"/>
      <circle cx="29" cy="-4" r="6" fill="#c7bdac" stroke="#756b5d" stroke-width="2"/>
      <rect x="-29" y="-29" width="58" height="48" rx="13" fill="#fdfaf4" stroke="#aa9f8d" stroke-width="3"/>
      <rect x="-20" y="-16" width="40" height="22" rx="9" fill="#312d27"/>
      <circle cx="-9" cy="-5" r="4" fill="#76d4c8"/>
      <circle cx="9" cy="-5" r="4" fill="#76d4c8"/>
      <rect x="-18" y="20" width="36" height="10" rx="5" fill="#c7bdac" stroke="#756b5d" stroke-width="2"/>
    </g>

    <g id="cx-message">
      <path d="M 0 -34 L 34 -17 L 34 18 L 0 37 L -34 18 L -34 -17 Z" fill="#eef8f5" stroke="#3f958c" stroke-width="5"/>
      <path d="M -17 -11 H 17 M -17 0 H 10 M -17 11 H 14" stroke="#3f756f" stroke-width="5" stroke-linecap="round"/>
    </g>
    <g id="cx-check">
      <circle r="20" fill="#65b982"/>
      <path d="M -9 0 L -2 8 L 11 -8" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </defs>

  <style>
    .cx-source-a { animation: cx-source-a 8.8s cubic-bezier(.42,0,.18,1) infinite; }
    .cx-wait { animation: cx-wait 8.8s ease-in-out infinite; transform-origin: 820px 286px; }
    .cx-source-b { animation: cx-source-b 8.8s cubic-bezier(.42,0,.18,1) infinite; }
    .cx-message { offset-path: path("M 600 662 C 690 662 690 540 820 470 C 930 410 930 286 820 286"); offset-rotate: 0deg; animation: cx-message-move 8.8s cubic-bezier(.34,0,.18,1) infinite; }
    .cx-comm { animation: cx-comm 8.8s ease-out infinite; transform-origin: 820px 470px; }
    .cx-continuation { animation: cx-continuation 8.8s cubic-bezier(.36,0,.18,1) infinite; }

    @keyframes cx-source-a {
      0%, 4% { transform: translate(120px,286px) scale(.86); opacity: 0; }
      8% { opacity: 1; transform: translate(120px,286px) scale(1); }
      26% { transform: translate(720px,286px) scale(1); opacity: 1; }
      31%, 100% { transform: translate(720px,286px) scale(.96); opacity: 0; }
    }
    @keyframes cx-wait {
      0%, 23%, 64%, 100% { opacity: 0; transform: scale(.76); }
      29% { opacity: 1; transform: scale(1.06); }
      33%, 56% { opacity: 1; transform: scale(1); }
      61% { opacity: .34; transform: scale(1.16); }
    }
    @keyframes cx-source-b {
      0%, 6% { transform: translate(130px,662px) scale(.86); opacity: 0; }
      10% { opacity: 1; transform: translate(130px,662px) scale(1); }
      38% { transform: translate(600px,662px) scale(1); opacity: 1; }
      84%, 94% { transform: translate(1410px,662px) scale(1); opacity: 1; }
      99%, 100% { transform: translate(1410px,662px) scale(.96); opacity: 0; }
    }
    @keyframes cx-message-move {
      0%, 36% { offset-distance: 0%; opacity: 0; transform: scale(.7); }
      40% { opacity: 1; transform: scale(1); }
      53% { offset-distance: 78%; opacity: 1; transform: scale(1); }
      59% { offset-distance: 100%; opacity: 1; transform: scale(1.08); }
      64%, 100% { offset-distance: 100%; opacity: 0; transform: scale(.72); }
    }
    @keyframes cx-comm {
      0%, 56%, 69%, 100% { opacity: 0; transform: scale(.56); }
      61% { opacity: 1; transform: scale(1); }
      66% { opacity: .22; transform: scale(1.55); }
    }
    @keyframes cx-continuation {
      0%, 61% { transform: translate(875px,286px) scale(.78); opacity: 0; }
      67% { transform: translate(875px,286px) scale(1); opacity: 1; }
      87%, 94% { transform: translate(1435px,286px) scale(1); opacity: 1; }
      99%, 100% { transform: translate(1435px,286px) scale(.96); opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .cx-source-a, .cx-wait, .cx-source-b, .cx-message, .cx-comm, .cx-continuation { animation: none !important; }
      .cx-source-a, .cx-wait, .cx-message { opacity: 0; }
      .cx-source-b { transform: translate(1260px,662px); opacity: 1; }
      .cx-comm { opacity: .22; transform: scale(1); }
      .cx-continuation { transform: translate(1280px,286px); opacity: 1; }
    }
  </style>

  <rect width="1672" height="941" fill="url(#cx-bg)"/>
  <ellipse cx="840" cy="470" rx="330" ry="250" fill="#ffffff" opacity="0.22" filter="url(#cx-blur)"/>

  <g transform="translate(836,470) rotate(-3.5) translate(-836,-470)">
  <g color="#4b9f98" transform="translate(0,286)"><use href="#cx-rail-shape"/></g>
  <g color="#d4963b" transform="translate(0,662)"><use href="#cx-rail-shape"/></g>

  <path d="M 820 330 V 422 M 820 518 V 618" fill="none" stroke="#d1c8b8" stroke-width="18" stroke-linecap="round"/>
  <path d="M 820 330 V 422 M 820 518 V 618" fill="none" stroke="#4b9f98" stroke-width="6" stroke-linecap="round" opacity="0.76"/>

  <g transform="translate(820,470)" filter="url(#cx-shadow)">
    <circle r="76" fill="#fbf8f1" stroke="#c9bda3" stroke-width="11"/>
    <circle r="54" fill="#f2edf5" stroke="#ffffff" stroke-width="5"/>
    <circle r="19" fill="#3f9e96"/>
    <path d="M -47 0 H -30 M 30 0 H 47" stroke="#806f58" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g class="cx-source-a" color="#4b9f98" filter="url(#cx-shadow)">
    <g transform="scale(1.12)"><use href="#cx-capsule"/><g transform="translate(0,-8)"><use href="#cx-hotel"/></g></g>
  </g>

  <g class="cx-wait">
    <circle cx="820" cy="286" r="130" fill="#fff9ed" fill-opacity=".18" stroke="#d99a3d" stroke-width="5"/>
    <circle cx="820" cy="286" r="94" fill="#fffaf0" fill-opacity=".42" stroke="#efc16c" stroke-width="3"/>
    <g transform="translate(820,286) scale(.72)"><use href="#cx-hotel"/></g>
    <path d="M 790 214 Q 820 188 850 214" fill="none" stroke="#d99a3d" stroke-width="7" stroke-linecap="round"/>
  </g>

  <g class="cx-source-b" color="#d4963b" filter="url(#cx-shadow)">
    <g transform="scale(1.12)"><use href="#cx-capsule"/><g transform="translate(0,-5) scale(1.02)"><use href="#cx-robot"/></g></g>
  </g>

  <g class="cx-message" filter="url(#cx-shadow)"><use href="#cx-message"/></g>
  <circle class="cx-comm" cx="820" cy="470" r="150" fill="url(#cx-halo)"/>

  <g class="cx-continuation" color="#4b9f98" filter="url(#cx-shadow)">
    <g transform="scale(1.12)"><use href="#cx-capsule"/><g transform="translate(0,-8) scale(.92)"><use href="#cx-room-key"/></g></g>
  </g>
  </g>
</svg>
